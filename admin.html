<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Admin - Advanced Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #0b0b0b; color: white; margin: 0; }
        .fz-green { color: #10b981; }
        .admin-card { background: #161616; border: 1px solid #222; border-radius: 20px; padding: 20px; }
        .tab-btn { padding: 12px; font-weight: bold; border-bottom: 2px solid transparent; color: #555; transition: 0.3s; }
        .tab-btn.active { color: #10b981; border-color: #10b981; }
        .thumb-checkbox { position: absolute; top: 8px; right: 8px; width: 20px; height: 20px; accent-color: #10b981; }
    </style>
</head>
<body class="pb-20">
    <header class="w-full p-3 flex justify-between items-center z-50 bg-white shadow-md h-14">
        <div class="text-black font-black text-lg"><span class="fz-green">A</span>DMIN</div>
        <img src="shilla_logo.png" alt="Shilla" class="h-7 w-auto cursor-pointer" onclick="location.href='index.html'">
    </header>

    <nav class="flex border-b border-gray-800 bg-black sticky top-0 z-50">
        <button onclick="showTab('photo')" id="tab-photo" class="tab-btn flex-1 active">사진/삭제 관리</button>
        <button onclick="showTab('manual')" id="tab-manual" class="tab-btn flex-1">텍스트 수정</button>
        <button onclick="showTab('user')" id="tab-user" class="tab-btn flex-1">비번/로그</button>
    </nav>

    <main class="p-6 space-y-6">
        <div class="admin-card">
            <h3 class="text-xs font-bold text-gray-500 mb-3 uppercase tracking-widest">System Configuration</h3>
            <input type="password" id="gh-token" placeholder="GitHub Personal Access Token 입력" class="w-full p-3 bg-black border border-gray-700 rounded-xl text-xs text-[#10b981] outline-none">
            <p class="text-[9px] text-gray-600 mt-2">* 삭제 및 업로드를 위해 반드시 토큰이 필요합니다.</p>
        </div>

        <div id="sec-photo" class="tab-content space-y-6">
            <div class="admin-card border-l-4 border-blue-500">
                <h3 class="text-blue-400 font-bold mb-4 flex items-center">📸 사진 등록</h3>
                <input type="text" id="upload-name" placeholder="등록할 직원 성함" class="w-full p-3 bg-black border border-gray-700 rounded-xl mb-3 text-sm">
                <input type="file" id="file-input" accept="image/*" class="w-full text-xs text-gray-500 mb-4">
                <button onclick="handleUpload()" class="w-full bg-blue-600 text-white font-black py-3 rounded-xl active:scale-95 transition-all">서버 업로드</button>
            </div>

            <div class="admin-card border-l-4 border-red-500">
                <h3 class="text-red-500 font-bold mb-4 flex items-center">🗑️ 사진 검색 및 삭제</h3>
                <div class="flex space-x-2 mb-4">
                    <input type="text" id="search-name" placeholder="삭제할 이름 입력 (예: 홍길동)" class="flex-grow p-3 bg-black border border-gray-700 rounded-xl text-sm">
                    <button onclick="searchPhotos()" class="px-6 bg-gray-800 text-white rounded-xl font-bold text-sm">검색</button>
                </div>
                
                <div id="search-results" class="grid grid-cols-2 gap-3 min-h-[100px]">
                    <p class="col-span-2 text-center text-gray-600 py-10 text-xs">이름을 검색하면 해당 사진들이 표시됩니다.</p>
                </div>

                <div id="delete-control" class="hidden mt-6 pt-4 border-t border-gray-800">
                    <button onclick="deleteSelected()" class="w-full bg-red-600 text-white font-black py-4 rounded-xl shadow-lg shadow-red-900/20">선택한 사진들 일괄 삭제</button>
                </div>
            </div>
        </div>

        <div id="sec-manual" class="tab-content hidden">... (매뉴얼 코드 생략) ...</div>
        <div id="sec-user" class="tab-content hidden">... (비번/로그 코드 생략) ...</div>
    </main>

    <script>
        const REPO = "psychjun/shilla-training";
        let foundPhotos = [];

        window.onload = () => {
            const savedToken = localStorage.getItem('gh_pat');
            if(savedToken) document.getElementById('gh-token').value = savedToken;
        };

        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('sec-' + tab).classList.remove('hidden');
            document.getElementById('tab-' + tab).classList.add('active');
        }

        // --- 사진 검색 기능 (핵심) ---
        async function searchPhotos() {
            const name = document.getElementById('search-name').value.trim();
            const resultsDiv = document.getElementById('search-results');
            if(!name) return alert("검색할 이름을 입력하세요.");

            resultsDiv.innerHTML = "<p class='col-span-2 text-center py-10'>검색 중...</p>";

            try {
                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/`);
                const data = await res.json();
                
                // 이름이 포함된 사진 필터링
                foundPhotos = data.filter(f => f.name.includes(name) && f.name.endsWith('.jpg'));

                if(foundPhotos.length === 0) {
                    resultsDiv.innerHTML = "<p class='col-span-2 text-center py-10 text-gray-500'>검색 결과가 없습니다.</p>";
                    document.getElementById('delete-control').classList.add('hidden');
                    return;
                }

                resultsDiv.innerHTML = foundPhotos.map(f => `
                    <div class="relative bg-black border border-gray-800 rounded-lg overflow-hidden">
                        <img src="${f.download_url}" class="w-full aspect-square object-cover opacity-60">
                        <input type="checkbox" class="thumb-checkbox" value="${f.sha}" data-name="${f.name}">
                        <div class="absolute bottom-0 left-0 right-0 bg-black/80 p-1 text-[9px] text-center truncate">
                            ${f.name}
                        </div>
                    </div>
                `).join('');
                document.getElementById('delete-control').classList.remove('hidden');

            } catch(e) {
                alert("GitHub 데이터를 불러오는데 실패했습니다.");
            }
        }

        // --- 일괄 삭제 기능 (핵심) ---
        async function deleteSelected() {
            const token = document.getElementById('gh-token').value;
            const selected = document.querySelectorAll('.thumb-checkbox:checked');
            
            if(!token) return alert("GitHub 토큰을 입력해주세요.");
            if(selected.length === 0) return alert("삭제할 사진을 선택해주세요.");
            if(!confirm(`선택한 ${selected.length}개의 사진을 영구 삭제하시겠습니까?`)) return;

            localStorage.setItem('gh_pat', token); // 토큰 자동 저장
            let successCount = 0;

            for(let item of selected) {
                const fileName = item.getAttribute('data-name');
                const sha = item.value;

                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${fileName}`, {
                    method: "DELETE",
                    headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ message: `Delete photo: ${fileName} by Admin`, sha: sha })
                });

                if(res.ok) {
                    successCount++;
                    addLog(`사진 삭제 완료: ${fileName}`);
                }
            }

            alert(`${successCount}개의 사진이 성공적으로 삭제되었습니다.`);
            searchPhotos(); // 목록 갱신
        }

        // --- 업로드 기능 (자동 번호 부여 포함) ---
        async function handleUpload() {
            const token = document.getElementById('gh-token').value;
            const name = document.getElementById('upload-name').value.trim();
            const fileInput = document.getElementById('file-input');
            
            if(!token || !name || !fileInput.files[0]) return alert("정보를 모두 입력하세요.");

            const res = await fetch(`https://api.github.com/repos/${REPO}/contents/`);
            const files = await res.json();
            const count = files.filter(f => f.name.startsWith(name)).length;
            const fileName = `${name}_${count + 1}.jpg`;

            const reader = new FileReader();
            reader.readAsDataURL(fileInput.files[0]);
            reader.onload = async () => {
                const base64 = reader.result.split(',')[1];
                const uploadRes = await fetch(`https://api.github.com/repos/${REPO}/contents/${fileName}`, {
                    method: "PUT",
                    headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ message: `Upload photo: ${fileName}`, content: base64 })
                });

                if(uploadRes.ok) {
                    addLog(`사진 등록 완료: ${fileName}`);
                    alert(`${fileName} 업로드 성공!`);
                    document.getElementById('upload-name').value = "";
                }
            };
        }

        function addLog(action) {
            let logs = JSON.parse(localStorage.getItem('shilla_system_logs') || '[]');
            logs.push({ user: sessionStorage.getItem('userName'), action: action, time: new Date().toISOString() });
            localStorage.setItem('shilla_system_logs', JSON.stringify(logs));
        }
    </script>
</body>
</html>
