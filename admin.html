<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #0b0b0b; color: white; }
        .tab-btn { padding: 12px; font-weight: bold; font-size: 14px; border-bottom: 2px solid transparent; color: #555; }
        .tab-btn.active { color: #10b981; border-color: #10b981; }
        .day-cell { aspect-ratio: 1; border: 1px solid #222; font-size: 10px; padding: 4px; cursor: pointer; }
        .day-cell.has-log { background: #10b98120; border-bottom: 2px solid #10b981; }
        .master-only { display: none; }
    </style>
</head>
<body class="pb-20">
    <header class="w-full p-3 flex justify-between items-center z-50 bg-white shadow-md h-14">
        <div class="text-black font-black text-lg"><span class="text-[#10b981]">A</span>DMIN</div>
        <img src="shilla_logo.png" alt="Shilla" class="h-7 w-auto" onclick="location.href='index.html'">
    </header>

    <nav class="flex border-b border-gray-800 bg-black sticky top-0 z-50">
        <button onclick="showTab('photo')" id="tab-photo" class="tab-btn flex-1 active">사진 관리</button>
        <button onclick="showTab('manual')" id="tab-manual" class="tab-btn flex-1">매뉴얼 수정</button>
        <button onclick="showTab('user')" id="tab-user" class="tab-btn flex-1 master-only">계정 관리</button>
        <button onclick="showTab('log')" id="tab-log" class="tab-btn flex-1 master-only">시스템 로그</button>
    </nav>

    <main class="p-6">
        <div id="sec-photo" class="tab-content space-y-6">
            <div class="bg-gray-900 p-6 rounded-2xl border border-gray-800">
                <h3 class="text-[#10b981] font-bold mb-4 italic">PHOTO UPLOAD</h3>
                <input type="text" id="target-name" placeholder="직원 이름" class="w-full p-3 bg-black border border-gray-700 rounded-xl mb-3 outline-none focus:border-[#10b981]">
                <input type="file" id="file-input" class="w-full text-xs text-gray-500 mb-4">
                <button onclick="handleUpload()" class="w-full bg-[#10b981] text-black font-black py-3 rounded-xl">업로드 실행</button>
            </div>
            <div class="grid grid-cols-2 gap-4" id="photo-list"></div>
        </div>

        <div id="sec-manual" class="tab-content hidden space-y-4">
            <div class="bg-gray-900 p-6 rounded-2xl border border-gray-800">
                <h3 class="text-[#d4af37] font-bold mb-4">순찰 매뉴얼 텍스트 수정</h3>
                <textarea id="manual-text" rows="10" class="w-full bg-black border border-gray-700 rounded-xl p-4 text-sm outline-none focus:border-[#10b981]"></textarea>
                <button onclick="saveManual()" class="w-full bg-white text-black font-black py-3 rounded-xl mt-4">수정사항 반영</button>
            </div>
        </div>

        <div id="sec-user" class="tab-content hidden space-y-4">
            <div class="bg-gray-900 p-4 rounded-xl border border-gray-800" id="user-list">
                </div>
        </div>

        <div id="sec-log" class="tab-content hidden">
            <div id="calendar-grid" class="grid grid-cols-7 mb-6"></div>
            <div id="daily-log-list" class="space-y-2 bg-gray-900 p-4 rounded-xl hidden"></div>
        </div>
    </main>

    <script>
        const REPO = "psychjun/shilla-training";
        const role = sessionStorage.getItem('userRole');
        const userName = sessionStorage.getItem('userName');

        // 권한에 따른 탭 노출 제어
        if(role === 'master') {
            document.querySelectorAll('.master-only').forEach(el => el.style.display = 'block');
        }

        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('sec-' + tab).classList.remove('hidden');
            document.getElementById('tab-' + tab).classList.add('active');
            if(tab === 'log') renderCalendar();
            if(tab === 'user') renderUsers();
            if(tab === 'photo') loadPhotoList();
        }

        function addLog(action) {
            let logs = JSON.parse(localStorage.getItem('shilla_system_logs') || '[]');
            logs.push({ user: userName, action: action, time: new Date().toISOString() });
            localStorage.setItem('shilla_system_logs', JSON.stringify(logs));
        }

        // 사진 삭제 시 로그 기록
        async function deletePhoto(name, sha) {
            if(!confirm(`${name}을 삭제하시겠습니까?`)) return;
            // ... (삭제 API 로직 생략) ...
            addLog(`사진 삭제: ${name}`); 
            loadPhotoList();
        }

        // 매뉴얼 저장 시 로그 기록
        function saveManual() {
            localStorage.setItem('manual_patrol', document.getElementById('manual-text').value);
            addLog(`매뉴얼 텍스트 수정`);
            alert("수정되었습니다.");
        }

        // 계정 리스트 (Master 전용)
        function renderUsers() {
            const USERS = { "1st": "1111", "1st_l": "free11", "2nd": "2222", "2nd_l": "free22", "master": "admin99" };
            const list = document.getElementById('user-list');
            list.innerHTML = Object.entries(USERS).map(([id, pw]) => `
                <div class="flex justify-between border-b border-gray-800 py-3 text-sm">
                    <span class="text-gray-400">${id}</span>
                    <span class="font-bold text-[#10b981]">${pw}</span>
                </div>
            `).join('');
        }

        // 캘린더 로그 렌더링
        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            const logs = JSON.parse(localStorage.getItem('shilla_system_logs') || '[]');
            grid.innerHTML = '';
            for(let i=1; i<=30; i++) {
                const dateStr = `2026-04-${String(i).padStart(2, '0')}`;
                const hasLog = logs.some(l => l.time.startsWith(dateStr));
                grid.innerHTML += `<div class="day-cell ${hasLog?'has-log':''}" onclick="showDayLogs('${dateStr}')">${i}</div>`;
            }
        }

        function showDayLogs(date) {
            const list = document.getElementById('daily-log-list');
            const logs = JSON.parse(localStorage.getItem('shilla_system_logs') || '[]');
            const filtered = logs.filter(l => l.time.startsWith(date)).reverse();
            list.classList.remove('hidden');
            list.innerHTML = filtered.map(l => `
                <div class="text-[10px] border-b border-gray-800 pb-1">
                    <span class="text-[#10b981]">[${l.user}]</span> ${l.action} 
                    <span class="text-gray-600 block">${new Date(l.time).toLocaleTimeString()}</span>
                </div>
            `).join('') || "기록 없음";
        }

        window.onload = () => showTab('photo');
    </script>
</body>
</html>
