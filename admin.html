<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Shilla Admin - Total Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #0b0b0b; color: white; margin: 0; }
        .fz-green { color: #10b981; }
        .admin-card { background: #161616; border: 1px solid #222; border-radius: 20px; padding: 20px; }
        .tab-btn { padding: 12px; font-weight: bold; border-bottom: 2px solid transparent; color: #555; transition: 0.3s; font-size: 13px; }
        .tab-btn.active { color: #10b981; border-color: #10b981; }
        .pw-card { background: #1a1a1a; border-left: 4px solid #10b981; padding: 15px; border-radius: 12px; }
        .pw-input { background: #000; border: 1px solid #333; color: #10b981; padding: 10px; border-radius: 8px; width: 100%; outline: none; font-family: monospace; }
        .thumb-checkbox { position: absolute; top: 8px; right: 8px; width: 22px; height: 22px; accent-color: #10b981; z-index: 10; }
        .day-cell { aspect-ratio: 1; border: 1px solid #222; font-size: 10px; padding: 4px; cursor: pointer; position: relative; }
        .day-cell.has-log::after { content: ''; position: absolute; bottom: 4px; right: 4px; width: 4px; height: 4px; background: #10b981; border-radius: 50%; }
    </style>
</head>
<body class="pb-20">
    <header class="w-full p-3 flex justify-between items-center z-50 bg-white shadow-md h-14">
        <div onclick="location.href='index.html'" class="flex items-center cursor-pointer active:opacity-70 transition-opacity">
            <div class="text-black font-black text-lg mr-2"><span class="fz-green">A</span>DMIN</div>
            <div class="text-[10px] text-gray-400 font-bold border border-gray-200 px-1.5 py-0.5 rounded uppercase tracking-tighter">Exit</div>
        </div>
        <img src="shilla_logo.png" alt="Shilla" class="h-7 w-auto cursor-pointer" onclick="location.href='index.html'">
    </header>

    <nav class="flex border-b border-gray-800 bg-black sticky top-0 z-50 overflow-x-auto">
        <button onclick="showTab('photo')" id="tab-photo" class="tab-btn flex-1 active whitespace-nowrap">사진 관리</button>
        <button onclick="showTab('food')" id="tab-food" class="tab-btn flex-1 whitespace-nowrap">식단표 갱신</button>
        <button onclick="showTab('manual')" id="tab-manual" class="tab-btn flex-1 whitespace-nowrap">매뉴얼 수정</button>
        <button onclick="showTab('user')" id="tab-user" class="tab-btn flex-1 whitespace-nowrap">비번 관리</button>
        <button onclick="showTab('log')" id="tab-log" class="tab-btn flex-1 whitespace-nowrap hidden">시스템 로그</button>
    </nav>

    <main class="p-6 space-y-6">
        <div class="admin-card">
            <h3 class="text-[10px] font-bold text-gray-500 mb-2 uppercase tracking-tighter text-center">GitHub Connection Token</h3>
            <input type="password" id="gh-token" placeholder="토큰을 입력하세요" class="w-full p-3 bg-black border border-gray-700 rounded-xl text-xs text-[#10b981] text-center">
        </div>

        <div id="sec-photo" class="tab-content space-y-6">
            <div class="admin-card border-l-4 border-blue-500">
                <h4 class="text-blue-400 font-bold mb-3 text-sm uppercase">New Staff Photo</h4>
                <input type="text" id="upload-name" placeholder="직원 성함" class="w-full p-3 bg-black border border-gray-700 rounded-xl mb-3 text-sm">
                <input type="file" id="file-input" class="w-full text-xs text-gray-500 mb-3">
                <button onclick="handleUpload()" class="w-full bg-blue-600 text-white font-black py-3 rounded-xl active:scale-95 transition-all">GITHUB 업로드</button>
            </div>
            <div class="admin-card border-l-4 border-red-500">
                <h4 class="text-red-500 font-bold mb-3 text-sm uppercase">Search & Delete</h4>
                <div class="flex space-x-2 mb-4">
                    <input type="text" id="search-name" placeholder="이름 입력" class="flex-grow p-3 bg-black border border-gray-700 rounded-xl text-sm">
                    <button onclick="searchPhotos()" class="px-4 bg-gray-800 rounded-xl text-sm font-bold active:scale-90 transition-all">검색</button>
                </div>
                <div id="search-results" class="grid grid-cols-2 gap-3"></div>
                <button id="del-btn" onclick="deleteSelected()" class="hidden w-full bg-red-600 text-white font-black py-4 rounded-xl mt-4">선택한 사진 삭제</button>
            </div>
        </div>

        <div id="sec-food" class="tab-content hidden">
            <div class="admin-card border-l-4 border-[#10b981]">
                <h3 class="text-[#10b981] font-bold mb-4 text-sm uppercase">Auto Meal Crawler</h3>
                <p class="text-[10px] text-gray-500 mb-4">* 버튼을 누르면 서버 로봇이 공항 사이트에서 식단표를 새로 긁어옵니다.</p>
                <button onclick="refreshFoodMenu()" class="w-full bg-[#10b981] text-black font-black py-4 rounded-xl active:scale-95 transition-all">식단표 즉시 크롤링</button>
            </div>
        </div>

        <div id="sec-manual" class="tab-content hidden">
            <div class="admin-card border-l-4 border-[#d4af37]">
                <h3 class="text-[#d4af37] font-bold mb-4 text-sm uppercase tracking-widest">Patrol Manual Server Edit</h3>
                <p class="text-[10px] text-gray-500 mb-4">* 수정한 글은 모든 조원의 '순찰업무' 메뉴에 즉시 반영됩니다.</p>
                <textarea id="manual-text" rows="12" class="w-full bg-black border border-gray-800 rounded-xl p-4 text-sm text-gray-300 outline-none focus:border-[#10b981]" placeholder="매뉴얼 내용을 입력하세요..."></textarea>
                <button onclick="updateGlobalManual()" class="w-full bg-white text-black font-black py-4 rounded-xl mt-4 active:scale-95 transition-all">서버 저장 및 배포</button>
            </div>
        </div>

        <div id="sec-user" class="tab-content hidden space-y-4">
            <div class="admin-card">
                <h3 class="text-blue-400 font-bold mb-6 italic tracking-widest uppercase text-sm">Server Password Control</h3>
                <div id="user-list-container" class="space-y-4"></div>
            </div>
        </div>

        <div id="sec-log" class="tab-content hidden space-y-4">
            <div class="admin-card">
                <h3 class="fz-green font-bold mb-4 text-sm uppercase tracking-widest">System Logs</h3>
                <div id="calendar-grid" class="grid grid-cols-7 border-t border-l border-gray-800 text-center"></div>
            </div>
            <div id="log-detail" class="admin-card hidden max-h-80 overflow-y-auto">
                <div id="log-list-box" class="space-y-2"></div>
            </div>
        </div>
    </main>

    <script>
        const REPO = "psychjun/shilla-training";
        const role = sessionStorage.getItem('userRole') || 'guest';
        const userName = sessionStorage.getItem('userName') || 'Unknown';
        
        window.onload = () => {
            if(role === 'master') document.getElementById('tab-log')?.classList.remove('hidden');
            const savedToken = localStorage.getItem('gh_pat');
            if(savedToken) document.getElementById('gh-token').value = savedToken;
            showTab('photo');
        };

        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('sec-' + tab).classList.remove('hidden');
            document.getElementById('tab-' + tab).classList.add('active');
            if(tab === 'user') renderUserManagement();
            if(tab === 'manual') loadManualFromServer();
            if(tab === 'log') renderCalendar();
        }

        // --- 사진 관리 로직 ---
        async function handleUpload() {
            const token = document.getElementById('gh-token').value;
            const name = document.getElementById('upload-name').value.trim();
            const fileInput = document.getElementById('file-input');
            if(!token || !name || !fileInput.files[0]) return alert("정보를 모두 입력하세요.");
            
            const reader = new FileReader();
            reader.readAsDataURL(fileInput.files[0]);
            reader.onload = async () => {
                const base64 = reader.result.split(',')[1];
                const fileName = `${name}_${Date.now()}.jpg`;
                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${fileName}`, {
                    method: "PUT",
                    headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ message: `Upload ${fileName}`, content: base64 })
                });
                if(res.ok) { addLog(`사진 등록: ${fileName}`); alert("업로드 성공!"); }
            };
        }

        async function searchPhotos() {
            const name = document.getElementById('search-name').value.trim();
            const resBox = document.getElementById('search-results');
            if(!name) return alert("검색어를 입력하세요.");
            resBox.innerHTML = "<p class='col-span-2 text-center text-xs py-10'>검색 중...</p>";
            const res = await fetch(`https://api.github.com/repos/${REPO}/contents/`);
            const data = await res.json();
            const found = data.filter(f => f.name.includes(name) && f.name.endsWith('.jpg'));
            if(found.length === 0) {
                resBox.innerHTML = "<p class='col-span-2 text-center text-xs py-10 text-gray-500'>결과 없음</p>";
                document.getElementById('del-btn').classList.add('hidden'); return;
            }
            resBox.innerHTML = found.map(f => `
                <div class="relative bg-black border border-gray-800 rounded-lg overflow-hidden">
                    <img src="${f.download_url}" class="w-full aspect-square object-cover opacity-60">
                    <input type="checkbox" class="thumb-checkbox" value="${f.sha}" data-name="${f.name}">
                    <div class="absolute bottom-0 p-1 text-[9px] w-full bg-black/80 text-center truncate">${f.name}</div>
                </div>
            `).join('');
            document.getElementById('del-btn').classList.remove('hidden');
        }

        async function deleteSelected() {
            const token = document.getElementById('gh-token').value;
            const checks = document.querySelectorAll('.thumb-checkbox:checked');
            if(!token || checks.length === 0) return alert("삭제할 사진을 선택하세요.");
            for(let c of checks) {
                const n = c.getAttribute('data-name');
                const s = c.value;
                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${n}`, {
                    method: "DELETE", headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ message: `Delete ${n}`, sha: s })
                });
                if(res.ok) addLog(`사진 삭제: ${n}`);
            }
            alert("삭제 완료!"); searchPhotos();
        }

        // --- 식단표 크롤링 로직 ---
        async function refreshFoodMenu() {
            const token = document.getElementById('gh-token').value;
            if(!token) return alert("토큰이 필요합니다.");
            if(!confirm("서버 로봇을 실행시켜 식단표를 새로 긁어올까요? (약 1분 소요)")) return;
            try {
                const res = await fetch(`https://api.github.com/repos/${REPO}/actions/workflows/update_menu.yml/dispatches`, {
                    method: "POST",
                    headers: { "Authorization": `token ${token}`, "Accept": "application/vnd.github.v3+json" },
                    body: JSON.stringify({ ref: "main" })
                });
                if(res.ok) { addLog("식단표 크롤링 요청"); alert("요청 완료! 약 1분 후 확인하세요."); }
            } catch(e) { alert("요청 실패!"); }
        }

        // --- 매뉴얼 서버 연동 ---
        async function loadManualFromServer() {
            const textarea = document.getElementById('manual-text');
            textarea.value = "불러오는 중...";
            try {
                const res = await fetch(`https://raw.githubusercontent.com/${REPO}/main/patrol_manual.json?t=${Date.now()}`);
                const data = await res.json();
                textarea.value = data.content;
            } catch(e) { textarea.value = "파일이 없습니다."; }
        }

        async function updateGlobalManual() {
            const token = document.getElementById('gh-token').value;
            const content = document.getElementById('manual-text').value;
            if(!token) return alert("토큰 필요");
            try {
                const fileRes = await fetch(`https://api.github.com/repos/${REPO}/contents/patrol_manual.json`, {
                    headers: { "Authorization": `token ${token}` }
                });
                const fileData = await fileRes.json();
                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/patrol_manual.json`, {
                    method: "PUT", headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        message: "Update Manual",
                        content: btoa(unescape(encodeURIComponent(JSON.stringify({content:content}, null, 2)))),
                        sha: fileData.sha
                    })
                });
                if(res.ok) { addLog("매뉴얼 서버 업데이트"); alert("배포 성공!"); }
            } catch(e) { alert("실패!"); }
        }

        // --- 비번 관리 (버튼: 변경) ---
        async function renderUserManagement() {
            const container = document.getElementById('user-list-container');
            container.innerHTML = "<p class='text-center text-xs py-10'>로드 중...</p>";
            try {
                const res = await fetch(`https://raw.githubusercontent.com/${REPO}/main/shilla_users.json?t=${Date.now()}`);
                const USERS = await res.json();
                container.innerHTML = '';
                Object.entries(USERS).forEach(([id, pw]) => {
                    let canManage = false;
                    if (role === 'master') canManage = true;
                    else if (role.includes('_l')) {
                        const squadPrefix = role.split('_')[0];
                        if (id === role || id === squadPrefix) canManage = true;
                    }
                    if (canManage) {
                        const card = document.createElement('div');
                        card.className = "pw-card space-y-3";
                        card.innerHTML = `
                            <div class="flex justify-between items-center">
                                <span class="text-sm font-black uppercase text-gray-200">${id}</span>
                                <button onclick="updateGlobalPw('${id}')" class="text-[10px] bg-[#10b981] text-black font-bold px-4 py-1.5 rounded-md active:scale-95">변경</button>
                            </div>
                            <input type="text" id="pw-input-${id}" value="${pw}" class="pw-input">
                        `;
                        container.appendChild(card);
                    }
                });
            } catch(e) { container.innerHTML = "실패!"; }
        }

        async function updateGlobalPw(id) {
            const token = document.getElementById('gh-token').value;
            const newPw = document.getElementById(`pw-input-${id}`).value;
            if(!token) return alert("토큰 필요");
            try {
                const fileRes = await fetch(`https://api.github.com/repos/${REPO}/contents/shilla_users.json`, {headers:{"Authorization":`token ${token}`}});
                const fileData = await fileRes.json();
                const currentUsers = JSON.parse(atob(fileData.content));
                currentUsers[id] = newPw;
                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/shilla_users.json`, {
                    method:"PUT", headers:{"Authorization":`token ${token}`,"Content-Type":"application/json"},
                    body:JSON.stringify({message:`Update Pw ${id}`, content:btoa(JSON.stringify(currentUsers,null,2)), sha:fileData.sha})
                });
                if(res.ok) { addLog(`비번 변경: ${id}`); localStorage.setItem('gh_pat', token); alert("비번 서버 반영 완료!"); }
            } catch(e) { alert("실패!"); }
        }

        // --- 기타 공통 ---
        function addLog(action) {
            let logs = JSON.parse(localStorage.getItem('shilla_system_logs') || '[]');
            logs.push({ user: userName, action: action, time: new Date().toISOString() });
            localStorage.setItem('shilla_system_logs', JSON.stringify(logs));
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            const logs = JSON.parse(localStorage.getItem('shilla_system_logs') || '[]');
            grid.innerHTML = '';
            for(let i=1; i<=31; i++) {
                const dateStr = `2026-04-${String(i).padStart(2, '0')}`;
                const hasLog = logs.some(l => l.time.startsWith(dateStr));
                grid.innerHTML += `<div class="day-cell ${hasLog?'has-log':''}" onclick="showDayLogs('${dateStr}')">${i}</div>`;
            }
        }

        function showDayLogs(date) {
            const box = document.getElementById('log-detail');
            const listBox = document.getElementById('log-list-box');
            const filtered = JSON.parse(localStorage.getItem('shilla_system_logs') || '[]').filter(l => l.time.startsWith(date)).reverse();
            box.classList.remove('hidden');
            listBox.innerHTML = filtered.map(l => `
                <div class="text-[10px] border-b border-gray-800 pb-2">
                    <span class="text-[#10b981] font-bold">[${l.user}]</span> ${l.action}
                    <span class="text-gray-600 block text-[9px] mt-1">${new Date(l.time).toLocaleTimeString()}</span>
                </div>
            `).join('') || "기록 없음";
        }
    </script>
</body>
</html>
