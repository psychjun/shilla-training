<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #0b0b0b; color: white; margin: 0; }
        .tab-btn { padding: 12px; font-weight: bold; font-size: 14px; border-bottom: 2px solid transparent; color: #555; }
        .tab-btn.active { color: #10b981; border-color: #10b981; }
        .admin-card { background: #161616; border: 1px solid #222; border-radius: 20px; padding: 20px; }
        .day-cell { aspect-ratio: 1; border: 1px solid #222; font-size: 10px; padding: 4px; cursor: pointer; position: relative; }
        .day-cell.has-log::after { content: ''; position: absolute; bottom: 4px; right: 4px; width: 4px; height: 4px; background: #10b981; border-radius: 50%; }
        .pw-input { background: #000; border: 1px solid #333; color: #10b981; padding: 4px 8px; border-radius: 8px; width: 120px; outline: none; }
    </style>
</head>
<body class="pb-20">
    <header class="w-full p-3 flex justify-between items-center z-50 bg-white shadow-md h-14">
        <div class="text-black font-black text-lg"><span class="text-[#10b981]">A</span>DMIN</div>
        <img src="shilla_logo.png" alt="Shilla" class="h-7 w-auto cursor-pointer" onclick="location.href='index.html'">
    </header>

    <nav class="flex border-b border-gray-800 bg-black sticky top-0 z-50 overflow-x-auto">
        <button onclick="showTab('photo')" id="tab-photo" class="tab-btn flex-1 active">사진 관리</button>
        <button onclick="showTab('manual')" id="tab-manual" class="tab-btn flex-1">매뉴얼</button>
        <button onclick="showTab('user')" id="tab-user" class="tab-btn flex-1">비번 관리</button> <button onclick="showTab('log')" id="tab-log" class="tab-btn flex-1 hidden" id="log-menu-btn">접속 로그</button>
    </nav>

    <main class="p-6">
        <div id="sec-photo" class="tab-content space-y-6">
            <div class="admin-card">
                <h3 class="text-[#10b981] font-bold mb-4">PHOTO UPLOAD</h3>
                <input type="text" id="target-name" placeholder="직원 이름" class="w-full p-3 bg-black border border-gray-700 rounded-xl mb-3 text-sm">
                <input type="file" id="file-input" class="w-full text-xs text-gray-500 mb-4">
                <button onclick="handleUpload()" class="w-full bg-[#10b981] text-black font-black py-3 rounded-xl">업로드</button>
            </div>
            <div class="grid grid-cols-2 gap-4" id="photo-list"></div>
        </div>

        <div id="sec-manual" class="tab-content hidden space-y-4">
            <div class="admin-card">
                <h3 class="text-[#d4af37] font-bold mb-4">텍스트 수정</h3>
                <textarea id="manual-text" rows="8" class="w-full bg-black border border-gray-800 rounded-xl p-4 text-sm"></textarea>
                <button onclick="saveManual()" class="w-full bg-white text-black font-black py-3 rounded-xl mt-4">저장</button>
            </div>
        </div>

        <div id="sec-user" class="tab-content hidden space-y-4">
            <div class="admin-card">
                <h3 class="text-blue-400 font-bold mb-4">계정 보안 설정</h3>
                <div id="user-list-container" class="space-y-4">
                    </div>
            </div>
        </div>

        <div id="sec-log" class="tab-content hidden space-y-6">
            <div class="admin-card">
                <h3 class="text-[#10b981] font-bold mb-4">활동 기록</h3>
                <div id="calendar-grid" class="grid grid-cols-7 border-t border-l border-gray-800"></div>
            </div>
            <div id="log-detail" class="admin-card hidden max-h-80 overflow-y-auto">
                <div id="log-list-box" class="space-y-2"></div>
            </div>
        </div>
    </main>

    <script>
        const REPO = "psychjun/shilla-training";
        const role = sessionStorage.getItem('userRole') || 'guest';
        const userName = sessionStorage.getItem('userName') || '알수없음';
        
        // 실제 운영 시에는 서버 DB를 써야 하지만, 현재는 로컬 스토리지 기반으로 구현
        let USERS_DATA = JSON.parse(localStorage.getItem('shilla_users') || JSON.stringify({
            "1st": "1111", "2nd": "2222", "3rd": "3333",
            "1st_l": "free11", "2nd_l": "free22", "3rd_l": "free33", "master": "admin99"
        }));

        window.onload = () => {
            if(role === 'master') document.getElementById('tab-log').classList.remove('hidden');
            showTab('photo');
        };

        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('sec-' + tab).classList.remove('hidden');
            document.getElementById('tab-' + tab).classList.add('active');
            if(tab === 'user') renderUserManagement();
            if(tab === 'log') renderCalendar();
            if(tab === 'photo') loadPhotoList();
        }

        // --- 비밀번호 관리 핵심 로직 ---
        function renderUserManagement() {
            const container = document.getElementById('user-list-container');
            container.innerHTML = '';

            Object.entries(USERS_DATA).forEach(([id, pw]) => {
                // 본인 계정이거나 Master인 경우만 표시
                if (role === 'master' || role === id) {
                    const row = document.createElement('div');
                    row.className = "flex flex-col space-y-2 p-3 bg-black rounded-xl border border-gray-800";
                    row.innerHTML = `
                        <div class="flex justify-between items-center">
                            <span class="text-sm font-bold text-gray-300">${id} (${id.includes('_l')?'주임':'조원'})</span>
                            <div class="flex space-x-2">
                                <button onclick="togglePwView('${id}')" class="text-[10px] bg-gray-800 px-2 py-1 rounded">보기</button>
                                <button onclick="updatePw('${id}')" class="text-[10px] bg-[#10b981] text-black px-2 py-1 rounded font-bold">변경</button>
                            </div>
                        </div>
                        <input type="password" id="pw-input-${id}" value="${pw}" class="pw-input w-full text-xs" readonly>
                    `;
                    container.appendChild(row);
                }
            });
        }

        function togglePwView(id) {
            const input = document.getElementById(`pw-input-${id}`);
            if (input.type === "password") {
                input.type = "text";
                input.removeAttribute('readonly');
                addLog(`비밀번호 조회: ${id}`);
            } else {
                input.type = "password";
                input.setAttribute('readonly', true);
            }
        }

        function updatePw(id) {
            const newPw = document.getElementById(`pw-input-${id}`).value;
            if(!newPw) return alert("비밀번호를 입력하세요.");
            
            USERS_DATA[id] = newPw;
            localStorage.setItem('shilla_users', JSON.stringify(USERS_DATA));
            addLog(`비밀번호 변경: ${id}`);
            alert(`${id}의 비밀번호가 변경되었습니다.`);
            renderUserManagement();
        }

        // --- 로그 및 공통 기능 ---
        function addLog(action) {
            let logs = JSON.parse(localStorage.getItem('shilla_system_logs') || '[]');
            logs.push({ user: userName, action: action, time: new Date().toISOString() });
            localStorage.setItem('shilla_system_logs', JSON.stringify(logs));
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            const logs = JSON.parse(localStorage.getItem('shilla_system_logs') || '[]');
            grid.innerHTML = '';
            for(let i=1; i<=30; i++) {
                const dateStr = `2026-04-${String(i).padStart(2, '0')}`;
                const hasLog = logs.some(l => l.time.startsWith(dateStr));
                grid.innerHTML += `<div class="day-cell ${hasLog?'has-log':''}" onclick="showDayLogs('${dateStr}')">${i}</div>`;
            }
        }

        function showDayLogs(date) {
            const box = document.getElementById('log-detail');
            const listBox = document.getElementById('log-list-box');
            const logs = JSON.parse(localStorage.getItem('shilla_system_logs') || '[]');
            const filtered = logs.filter(l => l.time.startsWith(date)).reverse();
            box.classList.remove('hidden');
            listBox.innerHTML = filtered.map(l => `
                <div class="text-[10px] border-b border-gray-800 pb-2">
                    <span class="text-[#10b981] font-bold">[${l.user}]</span> ${l.action}
                    <span class="text-gray-600 block text-[9px] mt-1">${new Date(l.time).toLocaleTimeString()}</span>
                </div>
            `).join('') || "기록 없음";
        }

        async function loadPhotoList() { /* 이전과 동일한 사진 리스트 로직 */ }
        function saveManual() { /* 이전과 동일한 매뉴얼 저장 로직 + addLog('매뉴얼 수정') */ }

    </script>
</body>
</html>
