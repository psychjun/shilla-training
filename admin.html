<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Admin - Access Logs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #0b0b0b; color: white; min-height: 100vh; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; background: #222; border: 1px solid #333; border-radius: 12px; overflow: hidden; }
        .day-cell { aspect-ratio: 1; background: #0b0b0b; padding: 10px; display: flex; flex-col; justify-content: space-between; cursor: pointer; transition: 0.2s; }
        .day-cell:hover { background: #1a1a1a; }
        .day-cell.has-log { border-bottom: 3px solid #10b981; }
        .day-cell.today { background: #10b98120; font-weight: bold; }
        .log-list { max-height: 250px; overflow-y: auto; }
        .fz-green { color: #10b981; }
    </style>
</head>
<body class="p-6">
    <header class="flex justify-between items-center mb-10">
        <h1 class="text-2xl font-black"><span class="fz-green">A</span>DMIN LOGS</h1>
        <button onclick="location.href='index.html'" class="text-xs text-gray-500 border border-gray-700 px-3 py-1 rounded">닫기</button>
    </header>

    <section class="max-w-md mx-auto space-y-8">
        <div>
            <h2 id="month-title" class="text-lg font-bold mb-4 text-[#d4af37]">2026.04</h2>
            <div class="calendar-grid" id="calendar-body">
                </div>
        </div>

        <div id="log-detail-section" class="hidden bg-white/5 rounded-3xl p-6 border border-white/10">
            <h3 id="selected-date-title" class="text-sm font-bold text-[#10b981] mb-4">4월 2일 접속 기록</h3>
            <div id="log-list" class="log-list space-y-2">
                </div>
        </div>
    </section>

    <script>
        let logs = JSON.parse(localStorage.getItem('shilla_logs') || '[]');

        function renderCalendar() {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            document.getElementById('month-title').innerText = `${year}.${month + 1}`;

            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();
            const calendarBody = document.getElementById('calendar-body');
            calendarBody.innerHTML = '';

            // 빈 칸 (첫 주 요일 맞추기)
            for (let i = 0; i < firstDay; i++) {
                calendarBody.innerHTML += `<div class="day-cell opacity-20"></div>`;
            }

            // 실제 날짜
            for (let d = 1; d <= lastDate; d++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const dayLogs = logs.filter(l => l.time.startsWith(dateStr));
                const isToday = d === now.getDate() ? 'today' : '';
                const hasLog = dayLogs.length > 0 ? 'has-log' : '';

                calendarBody.innerHTML += `
                    <div class="day-cell ${isToday} ${hasLog}" onclick="showLogs('${dateStr}')">
                        <span class="text-xs">${d}</span>
                        ${dayLogs.length > 0 ? `<span class="text-[8px] fz-green font-bold">${dayLogs.length}건</span>` : ''}
                    </div>
                `;
            }
        }

        function showLogs(date) {
            const section = document.getElementById('log-detail-section');
            const list = document.getElementById('log-list');
            const title = document.getElementById('selected-date-title');
            
            const dayLogs = logs.filter(l => l.time.startsWith(date)).reverse();
            
            if (dayLogs.length === 0) {
                alert("해당 날짜의 기록이 없습니다.");
                return;
            }

            section.classList.remove('hidden');
            title.innerText = `${date} 접속 기록`;
            list.innerHTML = dayLogs.map(l => `
                <div class="flex justify-between items-center bg-black/40 p-3 rounded-xl border border-white/5">
                    <span class="font-bold text-white text-sm">${l.user}</span>
                    <span class="text-[10px] text-gray-500">${new Date(l.time).toLocaleTimeString()}</span>
                </div>
            `).join('');
        }

        renderCalendar();
    </script>
</body>
</html>
