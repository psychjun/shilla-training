<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Freezone Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #000; color: white; margin: 0; overflow: hidden; height: 100dvh; }
        .app-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); transition: all 0.2s; }
        .app-card:active { transform: scale(0.95); background: rgba(255, 255, 255, 0.2); }
        .bg-shilla { background-image: url('shilla_center.jpg'); background-size: cover; background-position: center; }
    </style>
</head>
<body class="bg-shilla flex flex-col items-center">
    <div class="absolute inset-0 bg-black/70 z-0"></div>

    <header class="w-full p-3 flex justify-between items-center z-50 bg-white shadow-md h-12">
        <img src="freezone_logo.png" alt="Freezone" class="h-6 w-auto">
        <img src="shilla_logo.png" alt="Shilla" class="h-4 w-auto">
    </header>

    <main class="relative z-10 w-full max-w-sm flex-grow flex flex-col items-center pt-10 px-6">
        
        <div id="login-section" class="w-full space-y-6 mt-10">
            <div class="text-center mb-10">
                <h1 class="text-3xl font-bold text-[#d4af37]">FREEZONE</h1>
                <p class="text-gray-400 text-sm mt-2">서비스 접속을 위해 로그인하세요</p>
            </div>
            <div class="space-y-3">
                <input type="text" id="user-id" placeholder="ID (예: 1st, master)" class="w-full p-4 bg-white/10 border border-white/20 rounded-xl text-white outline-none focus:border-[#d4af37]">
                <input type="password" id="user-pw" placeholder="Password" class="w-full p-4 bg-white/10 border border-white/20 rounded-xl text-white outline-none focus:border-[#d4af37]">
                <button onclick="checkLogin()" class="w-full bg-[#d4af37] text-black font-bold py-4 rounded-xl shadow-lg active:scale-95 transition-all">로그인</button>
            </div>
            <p id="login-error" class="text-red-500 text-xs text-center h-4"></p>
        </div>

        <div id="menu-section" class="hidden w-full h-full flex flex-col">
            <div class="flex justify-between items-end mb-8">
                <div>
                    <h2 class="text-2xl font-bold text-white"><span id="welcome-user">1st</span> 조님,</h2>
                    <p class="text-[#d4af37]">오늘도 안전근무 하십시오.</p>
                </div>
                <button onclick="location.reload()" class="text-xs text-gray-400 underline">로그아웃</button>
            </div>

            <div class="grid grid-cols-3 gap-4 w-full">
                <button onclick="location.href='quiz.html'" class="flex flex-col items-center space-y-2">
                    <div class="app-card w-16 h-16 rounded-2xl flex items-center justify-center text-2xl">👤</div>
                    <span class="text-[10px] font-medium">이름 맞추기</span>
                </button>
                <button onclick="location.href='food.html'" class="flex flex-col items-center space-y-2">
                    <div class="app-card w-16 h-16 rounded-2xl flex items-center justify-center text-2xl">🍱</div>
                    <span class="text-[10px] font-medium">구내식당</span>
                </button>
                <button id="admin-btn" onclick="location.href='admin.html'" class="hidden flex flex-col items-center space-y-2">
                    <div class="app-card w-16 h-16 rounded-2xl flex items-center justify-center text-2xl">⚙️</div>
                    <span class="text-[10px] font-medium text-[#d4af37]">관리자</span>
                </button>
                <div class="flex flex-col items-center space-y-2 opacity-50">
                    <div class="app-card w-16 h-16 rounded-2xl flex items-center justify-center text-2xl">🔦</div>
                    <span class="text-[10px] font-medium">순찰 매뉴얼</span>
                </div>
                <div class="flex flex-col items-center space-y-2 opacity-50">
                    <div class="app-card w-16 h-16 rounded-2xl flex items-center justify-center text-2xl">🛡️</div>
                    <span class="text-[10px] font-medium">출입검색</span>
                </div>
                <div class="flex flex-col items-center space-y-2 opacity-50">
                    <div class="app-card w-16 h-16 rounded-2xl flex items-center justify-center text-2xl">🚨</div>
                    <span class="text-[10px] font-medium">비상연락</span>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 🔐 생성된 계정 정보 (팀장님 요청 반영)
        const USERS = {
            "1st": "freezone1011",
            "2nd": "freezone2022",
            "3rd": "freezone3033",
            "master": "freezone9999"
        };

        function checkLogin() {
            const id = document.getElementById('user-id').value;
            const pw = document.getElementById('user-pw').value;
            const error = document.getElementById('login-error');

            if (USERS[id] && USERS[id] === pw) {
                // 로그인 성공
                sessionStorage.setItem('isLoggedIn', 'true');
                sessionStorage.setItem('userRole', id);
                showMenu(id);
            } else {
                error.innerText = "아이디 또는 비밀번호가 올바르지 않습니다.";
            }
        }

        function showMenu(role) {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('menu-section').classList.remove('hidden');
            document.getElementById('welcome-user').innerText = role;
            
            // 마스터 계정일 때만 관리자 버튼 표시
            if (role === 'master') {
                document.getElementById('admin-btn').classList.remove('hidden');
            }
        }

        // 페이지 로드 시 로그인 상태 유지 확인
        window.onload = () => {
            const isLoggedIn = sessionStorage.getItem('isLoggedIn');
            const userRole = sessionStorage.getItem('userRole');
            if (isLoggedIn === 'true') showMenu(userRole);
        };
    </script>
</body>
</html>
