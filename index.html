<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shilla Staff Recognition Training Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        fz: { base: '#0a0a0a', card: '#161616', accent: '#d4af37', mic: '#e11d48' },
                    },
                    backgroundImage: {
                        'shilla-center': "url('shilla_center.jpg')",
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;400;700&family=Playfair+Display:wght@600&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #000; color: white; -webkit-tap-highlight-color: transparent; overflow: hidden; }
        .eng-title { font-family: 'Playfair Display', serif; }
        .card-fade-in { animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .bg-overlay::before { content: ""; position: absolute; inset: 0; background-color: rgba(0, 0, 0, 0.85); z-index: -1; }
        .mic-active { animation: pulse 1.3s infinite; background-color: #be123c !important; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(225, 29, 72, 0.6); } 70% { box-shadow: 0 0 0 20px rgba(225, 29, 72, 0); } 100% { box-shadow: 0 0 0 0 rgba(225, 29, 72, 0); } }
    </style>
</head>
<body class="flex flex-col min-h-screen bg-shilla-center bg-cover bg-center bg-no-repeat bg-overlay relative z-0">

    <header class="w-full p-4 flex justify-between items-center sticky top-0 z-50 shadow-md" style="background-color: #ffffff !important;">
        <img src="freezone_logo.png" alt="Freezone" class="h-8 w-auto object-contain">
        <img src="shilla_logo.png" alt="Shilla" class="h-5 w-auto object-contain">
    </header>

    <main class="flex-grow flex flex-col items-center justify-center p-6 pb-32 relative z-10">
        <div id="game-container" class="w-full max-sm:max-w-xs max-w-sm">
            
            <div id="start-section" class="space-y-12 card-fade-in relative z-10">
                <div class="text-right flex flex-col items-end space-y-0.5">
                    <p class="text-[12px] text-fz-accent font-bold tracking-widest leading-tight">Freezone</p>
                    <div class="pt-2">
                        <p class="text-[10px] text-gray-400 font-light leading-none uppercase">Shilla Staff</p>
                        <p class="text-[10px] text-gray-400 font-light leading-none uppercase">Recognition Training Tool</p>
                    </div>
                    <p class="text-[9px] text-gray-500 font-extralight italic">for New Employees</p>
                </div>

                <div class="text-center space-y-3">
                    <h2 class="text-5xl eng-title font-bold text-white tracking-tighter pt-4">Shilla <span class="text-fz-accent">Names</span></h2>
                    <p class="text-2xl text-white pt-1 font-light">임직원 이름 맞추기</p>
                    <p class="text-[10px] text-gray-500 pt-1 font-extralight tracking-tight">신라 2통합물류센터 신입근무자 교육자료</p>
                </div>
                
                <div class="bg-fz-card/70 backdrop-blur-md p-8 rounded-3xl border border-gray-800 shadow-2xl text-center">
                    <p class="text-gray-400 text-sm font-light">등록된 사진 장수</p>
                    <p class="text-6xl font-bold text-fz-accent py-3 tracking-tight"><span id="total-count">0</span></p>
                </div>
                
                <button onclick="startGame()" class="w-full bg-fz-accent hover:bg-white text-black text-xl font-bold py-5 rounded-2xl shadow-xl transform active:scale-95 transition-all duration-150 tracking-wide">
                    교육 시작
                </button>
            </div>

            <div id="quiz-section" class="hidden space-y-9 card-fade-in relative z-10 text-center">
                <div class="relative w-full aspect-[3/4] mx-auto bg-fz-card/80 backdrop-blur-sm rounded-3xl border-2 border-fz-accent overflow-hidden shadow-2xl" id="photo-card">
                    <img id="employee-img" src="" alt="Employee" class="w-full h-full object-cover">
                    <div id="feedback-overlay" class="absolute inset-0 flex items-center justify-center opacity-0 transition-opacity duration-300 z-20 pointer-events-none bg-black/80">
                        <div id="feedback-text" class="text-9xl font-bold"></div>
                    </div>
                </div>
                <div class="space-y-5">
                    <p id="status-msg" class="text-gray-300 h-6 text-sm font-light italic">이름을 말씀하세요.</p>
                    <button id="mic-btn" class="w-20 h-20 rounded-full bg-fz-mic text-white flex items-center justify-center mx-auto shadow-xl transform active:scale-90 transition-all z-30">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-10 h-10">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 0 0 6-6v-1.5m-6 7.5a6 6 0 0 1-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 0 1-3-3V4.5a3 3 0 1 1 6 0v8.25a3 3 0 0 1-3 3Z" />
                        </svg>
                    </button>
                    <div id="result-feedback" class="text-2xl font-bold h-10 pt-2 text-gray-500"></div>
                </div>
            </div>

            <div id="result-section" class="hidden space-y-10 card-fade-in relative z-10 text-center">
                <div class="space-y-2 text-white">
                    <h2 class="text-xs text-fz-accent tracking-widest uppercase">Training Result</h2>
                    <p class="text-4xl font-light">수고하셨습니다!</p>
                </div>
                <div class="bg-fz-card/70 backdrop-blur-md p-10 rounded-3xl border-2 border-fz-accent shadow-2xl space-y-5">
                    <p id="accuracy" class="text-8xl font-bold text-fz-accent eng-title">0%</p>
                    <p class="text-2xl text-gray-100"><span id="correct-count">0</span> / <span id="total-quiz">0</span>개 정답</p>
                </div>
                <button onclick="location.reload()" class="w-full bg-gray-800 text-white py-4 rounded-xl font-medium text-lg">다시 도전하기</button>
            </div>
        </div>
    </main>

    <footer class="w-full py-7 px-4 text-center fixed bottom-0 z-50" 
            style="background: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0.8) 100%); backdrop-filter: blur(8px);">
        <div class="flex flex-col items-center justify-center space-y-1.5">
            <p class="text-[9px] text-gray-500 tracking-[0.4em] font-light uppercase opacity-80">Designed & Programmed</p>
            <p class="text-sm tracking-[0.1em] font-extralight text-gray-300">
                Developed By <span class="text-fz-accent font-bold ml-1 border-b border-fz-accent/40 pb-0.5">정호준</span>
            </p>
        </div>
    </footer>

    <script>
        const photoFiles = ["정연준_1.jpg", "진준영_1.jpg", "김동원_1.jpg", "정혜원_1.jpg"];
        let currentIdx = 0; let correctAnswers = 0; let shuffledPhotos = [];
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = SpeechRecognition ? new SpeechRecognition() : null;
        if (recognition) { recognition.lang = 'ko-KR'; recognition.interimResults = false; }
        const micBtn = document.getElementById('mic-btn'); const overlay = document.getElementById('feedback-overlay'); const feedbackText = document.getElementById('feedback-text');
        function startGame() { shuffledPhotos = [...photoFiles].sort(() => Math.random() - 0.5); document.getElementById('start-section').classList.add('hidden'); document.getElementById('quiz-section').classList.remove('hidden'); showNextQuestion(); }
        function showNextQuestion() { if (currentIdx >= shuffledPhotos.length) return showFinalResult(); overlay.classList.remove('opacity-100'); overlay.classList.add('opacity-0'); feedbackText.innerText = ""; document.getElementById('employee-img').src = shuffledPhotos[currentIdx]; document.getElementById('result-feedback').innerText = ""; document.getElementById('status-msg').innerText = "이름을 말씀하세요."; }
        micBtn.addEventListener('click', () => { if (!recognition) return alert("미지원 브라우저"); try { recognition.start(); } catch(e) {} });
        if (recognition) { recognition.onstart = () => { micBtn.classList.add('mic-active'); document.getElementById('status-msg').innerText = "듣고 있습니다..."; }; recognition.onend = () => micBtn.classList.remove('mic-active'); recognition.onresult = (event) => { const speechResult = event.results[0][0].transcript.replace(/\s/g, ""); const fileName = shuffledPhotos[currentIdx]; const correctAnswer = fileName.split('_')[0]; showFeedback(speechResult.includes(correctAnswer), correctAnswer); }; }
        function showFeedback(isCorrect, name) { overlay.classList.remove('opacity-0'); overlay.classList.add('opacity-100'); if (isCorrect) { feedbackText.innerText = "✅"; feedbackText.className = "text-9xl text-green-500 card-fade-in"; document.getElementById('result-feedback').innerText = "정답: " + name; document.getElementById('result-feedback').className = "text-2xl font-bold text-green-500 h-10 pt-2"; correctAnswers++; } else { feedbackText.innerText = "❌"; feedbackText.className = "text-9xl text-red-500 card-fade-in"; document.getElementById('result-feedback').innerText = "정답: " + name; document.getElementById('result-feedback').className = "text-2xl font-bold text-red-500 h-10 pt-2"; } setTimeout(() => { currentIdx++; showNextQuestion(); }, 1800); }
        function showFinalResult() { document.getElementById('quiz-section').classList.add('hidden'); document.getElementById('result-section').classList.remove('hidden'); const acc = Math.round((correctAnswers / shuffledPhotos.length) * 100); document.getElementById('accuracy').innerText = acc + "%"; document.getElementById('correct-count').innerText = correctAnswers; document.getElementById('total-quiz').innerText = shuffledPhotos.length; }
        document.getElementById('total-count').innerText = photoFiles.length;
    </script>
</body>
</html>
