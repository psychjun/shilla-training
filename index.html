<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Freezone Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #000; color: white; margin: 0; overflow: hidden; height: 100dvh; }
        .app-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.2); transition: all 0.2s; }
        .app-card:active { transform: scale(0.92); background: rgba(255, 255, 255, 0.25); }
        .bg-shilla { background-image: url('shilla_center.jpg'); background-size: cover; background-position: center; }
        .fz-logo { font-weight: 900; letter-spacing: -0.05em; }
        .fz-green { color: #10b981; }
    </style>
</head>
<body class="bg-shilla flex flex-col items-center">
    <div class="absolute inset-0 bg-black/75 z-0"></div>

    <header class="w-full p-3 flex justify-between items-center z-50 bg-white shadow-md h-14">
        <img src="freezone_logo.png" alt="Freezone" class="h-6 w-auto">
        <img src="shilla_logo.png" alt="Shilla" class="h-7 w-auto"> 
    </header>

    <main class="relative z-10 w-full max-w-sm flex-grow flex flex-col items-center pt-12 px-8">
        
        <div id="login-section" class="w-full space-y-8 mt-10">
            <div class="text-center">
                <h1 class="text-6xl fz-logo mb-2 tracking-tighter">
                    <span class="fz-green">F</span>REEZ<span class="fz-green">O</span>NE
                </h1>
                <p class="text-gray-400 text-[10px] tracking-widest uppercase">Security Portal</p>
            </div>
            <div class="space-y-3">
                <input type="text" id="user-id" placeholder="ID" class="w-full p-4 bg-white/10 border border-white/20 rounded-2xl text-white outline-none focus:border-[#10b981]">
                <input type="password" id="user-pw" placeholder="Password" class="w-full p-4 bg-white/10 border border-white/20 rounded-2xl text-white outline-none focus:border-[#10b981]">
                <button id="login-btn" onclick="checkLogin()" class="w-full bg-[#10b981] text-white font-black py-4 rounded-2xl shadow-xl active:scale-95 transition-all mt-4">로그인</button>
            </div>
            <p id="login-error" class="text-red-500 text-xs text-center h-4 font-bold"></p>
        </div>

        <div id="menu-section" class="hidden w-full h-full flex flex-col">
            <div class="flex justify-between items-start mb-10">
                <div>
                    <h2 class="text-3xl font-black text-white"><span id="welcome-user"></span>,</h2>
                    <p class="text-[#10b981] font-bold mt-1">오늘도 안전근무 하십시오.</p>
                </div>
                <button onclick="logout()" class="text-[10px] text-gray-500 border border-gray-700 px-2 py-1 rounded-md">로그아웃</button>
            </div>

            <div class="grid grid-cols-3 gap-6 w-full">
                <button onclick="location.href='quiz.html'" class="flex flex-col items-center space-y-2">
                    <div class="app-card w-16 h-16 rounded-[22px] flex items-center justify-center text-3xl">👤</div>
                    <span class="text-[11px] font-bold text-gray-300">Shilla Names</span>
                </button>
                <button onclick="location.href='food.html'" class="flex flex-col items-center space-y-2">
                    <div class="app-card w-16 h-16 rounded-[22px] flex items-center justify-center text-3xl">🍱</div>
                    <span class="text-[11px] font-bold text-gray-300">구내식당</span>
                </button>
                <button onclick="location.href='contacts.html'" class="flex flex-col items-center space-y-2">
                    <div class="app-card w-16 h-16 rounded-[22px] flex items-center justify-center text-3xl">📞</div>
                    <span class="text-[11px] font-bold text-[#10b981]">비상연락</span>
                </button>
                <button onclick="location.href='patrol.html'" class="flex flex-col items-center space-y-2">
                    <div class="app-card w-16 h-16 rounded-[22px] flex items-center justify-center text-3xl">🔦</div>
                    <span class="text-[11px] font-bold text-gray-300">순찰업무</span>
                </button>
                <button id="admin-btn" onclick="location.href='admin.html'" class="hidden flex flex-col items-center space-y-2">
                    <div class="app-card w-16 h-16 rounded-[22px] flex items-center justify-center text-3xl">⚙️</div>
                    <span class="text-[11px] font-bold text-gray-400">관리자</span>
                </button>
            </div>
        </div>

        <footer class="absolute bottom-10 text-[11px] font-normal italic tracking-widest text-gray-500/50">
            제작 : <span class="text-gray-400 font-bold">정호준</span>
        </footer>
    </main>

    <script>
        const REPO = "psychjun/shilla-training";
        const NAMES = { 
            "1st": "1조 조원", "2nd": "2조 조원", "3rd": "3조 조원",
            "1st_l": "1조 주임", "2nd_l": "2조 주임", "3rd_l": "3조 주임", "master": "Master" 
        };

        // --- [핵심] GitHub 서버 기반 로그인 처리 ---
        async function checkLogin() {
            const id = document.getElementById('user-id').value;
            const pw = document.getElementById('user-pw').value;
            const btn = document.getElementById('login-btn');
            const errorText = document.getElementById('login-error');

            if(!id || !pw) {
                errorText.innerText = "ID와 Password를 입력하세요.";
                return;
            }

            btn.innerText = "보안 확인 중...";
            btn.disabled = true;

            try {
                // 캐시 방지를 위해 랜덤 쿼리 추가하여 서버(GitHub)에서 최신 비번 데이터 로드
                const res = await fetch(`https://raw.githubusercontent.com/${REPO}/main/shilla_users.json?t=${new Date().getTime()}`);
                if(!res.ok) throw new Error("서버 파일 없음");
                
                const USERS = await res.json();

                if (USERS[id] && USERS[id] === pw) {
                    sessionStorage.setItem('isLoggedIn', 'true');
                    sessionStorage.setItem('userRole', id);
                    sessionStorage.setItem('userName', NAMES[id]);
                    
                    // 관리자급 접속 시 시스템 로그 기록 (로컬)
                    if(id.includes('_l') || id === 'master') {
                        saveLog(`${NAMES[id]} 관리자 접속`);
                    }
                    showMenu(id);
                } else {
                    errorText.innerText = "ID 또는 비밀번호가 틀립니다.";
                }
            } catch (e) {
                alert("로그인 서버에 접속할 수 없습니다. shilla_users.json 파일을 확인해 주세요.");
            } finally {
                btn.innerText = "로그인";
                btn.disabled = false;
            }
        }

        // 로컬 로그 기록
        function saveLog(action) {
            let logs = JSON.parse(localStorage.getItem('shilla_system_logs') || '[]');
            logs.push({ user: sessionStorage.getItem('userName'), action: action, time: new Date().toISOString() });
            localStorage.setItem('shilla_system_logs', JSON.stringify(logs));
        }

        // 로그인 성공 시 UI 전환
        function showMenu(role) {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('menu-section').classList.remove('hidden');
            document.getElementById('welcome-user').innerText = NAMES[role];
            
            // 주임 이상 계정일 경우에만 관리자 버튼 노출
            if(role.includes('_l') || role === 'master') {
                document.getElementById('admin-btn').classList.remove('hidden');
            }
        }

        function logout() { 
            sessionStorage.clear(); 
            location.replace('index.html'); 
        }

        // 새로고침 시 로그인 상태 유지 확인
        window.onload = () => { 
            if (sessionStorage.getItem('isLoggedIn') === 'true') {
                showMenu(sessionStorage.getItem('userRole'));
            }
        };
    </script>
</body>
</html>
