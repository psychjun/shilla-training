<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shilla Staff Recognition Training Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        fz: { base: '#0a0a0a', card: '#161616', accent: '#d4af37', mic: '#e11d48' },
                    },
                    backgroundImage: {
                        'shilla-center': "url('shilla_center.jpg')",
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;400;500;700&family=Playfair+Display:wght@600&display=swap');
        
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #000; color: white; -webkit-tap-highlight-color: transparent; overflow: hidden; }
        .eng-title { font-family: 'Playfair Display', serif; }
        
        .card-fade-in { animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .bg-overlay::before { content: ""; position: absolute; inset: 0; background-color: rgba(0, 0, 0, 0.85); z-index: -1; }
        .mic-active { animation: pulse 1.3s infinite; background-color: #be123c !important; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(225, 29, 72, 0.6); } 70% { box-shadow: 0 0 0 20px rgba(225, 29, 72, 0); } 100% { box-shadow: 0 0 0 0 rgba(225, 29, 72, 0); } }
        .fz-stretch { display: inline-block; transform: scaleY(1.35); transform-origin: center; }
        .shilla-staff-tag { display: inline-flex; border: 1px solid white; border-radius: 1px; overflow: hidden; }
    </style>
</head>
<body class="flex flex-col min-h-screen bg-shilla-center bg-cover bg-center bg-no-repeat bg-overlay relative z-0">

    <header class="w-full p-4 flex justify-between items-center sticky top-0 z-50 shadow-lg" style="background-color: #ffffff !important;">
        <img src="freezone_logo.png" alt="Freezone" class="h-9 w-auto object-contain">
        <img src="shilla_logo.png" alt="Shilla" class="h-6 w-auto object-contain">
    </header>

    <main class="flex-grow flex flex-col items-center justify-center p-6 pb-40 relative z-10">
        <div id="game-container" class="w-full max-sm:max-w-xs max-w-sm">
            
            <div id="start-section" class="space-y-16 card-fade-in relative z-10">
                <div class="text-right flex flex-col items-end space-y-3 text-white">
                    <p class="text-[17px] font-bold tracking-[0.3em] leading-tight fz-stretch">
                        <span class="text-emerald-400">F</span>reez<span class="text-emerald-400">o</span>ne
                    </p>
                    <div class="pt-1">
                        <div class="shilla-staff-tag">
                            <span class="bg-black text-white text-[11px] font-bold px-2 py-0.5 uppercase tracking-[0.1em] block">Shilla</span>
                            <span class="bg-red-600 text-white text-[11px] font-bold px-2 py-0.5 uppercase tracking-[0.1em] block">Staff</span>
                        </div>
                    </div>
                    <div class="space-y-0.5 text-fz-accent">
                        <p class="text-[11px] font-medium leading-none uppercase tracking-[0.05em]">Recognition Training Tool</p>
                    </div>
                    <p class="text-[11px] font-normal italic tracking-wide text-gray-400">for New Employees</p>
                </div>

                <div class="text-center space-y-5">
                    <h2 class="text-6xl eng-title font-bold tracking-tighter pt-4 text-shadow-lg">
                        <span class="text-white">Shilla</span> <span class="text-fz-accent">Names</span>
                    </h2>
                    <p class="text-3xl text-white pt-1 font-normal text-center">임직원 이름 맞추기</p>
                    <p class="text-[12px] text-gray-300 pt-1 font-medium tracking-tight text-center">신라 2통합물류센터 신입근무자 교육자료</p>
                </div>
                
                <div class="bg-fz-card/75 backdrop-blur-md p-9 rounded-3xl border border-gray-700 shadow-2xl text-center">
                    <p class="text-gray-300 text-base font-normal">등록된 사진 장수</p>
                    <p class="text-7xl font-bold text-fz-accent py-4 tracking-tight"><span id="total-count">...</span></p>
                </div>
                
                <button onclick="startGame()" id="start-btn" disabled class="w-full bg-gray-600 text-black text-2xl font-bold py-6 rounded-2xl shadow-xl transition-all tracking-wide opacity-50 cursor-not-allowed transform active:scale-95 duration-150">
                    데이터 불러오는 중...
                </button>
            </div>

            <div id="quiz-section" class="hidden space-y-9 card-fade-in relative z-10 text-center">
                <div class="relative w-full aspect-[3/4] mx-auto bg-fz-card/80 backdrop-blur-sm rounded-3xl border-2 border-fz-accent overflow-hidden shadow-2xl" id="photo-card">
                    <img id="employee-img" src="" alt="Employee" class="w-full h-full object-cover">
                    <div id="feedback-overlay" class="absolute inset-0 flex items-center justify-center opacity-0 transition-opacity duration-300 z-20 pointer-events-none bg-black/80">
                        <div id="feedback-text" class="text-9xl font-bold feedback-text"></div>
                    </div>
                </div>
                <div class="space-y-6">
                    <p id="status-msg" class="text-white h-6 text-base font-medium italic">이름을 말씀하세요.</p>
                    <button id="mic-btn" class="w-22 h-22 rounded-full bg-fz-mic text-white flex items-center justify-center mx-auto shadow-xl transform active:scale-90 transition-all z-30">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-11 h-11">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 0 0 6-6v-1.5m-6 7.5a6 6 0 0 1-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 0 1-3-3V4.5a3 3 0 1 1 6 0v8.25a3 3 0 0 1-3 3Z" />
                        </svg>
                    </button>
                    <div id="result-feedback" class="text-2xl font-bold h-10 pt-2 text-gray-200"></div>
                </div>
            </div>

            <div id="result-section" class="hidden space-y-12 card-fade-in relative z-10 text-center">
                <div class="space-y-3 text-white text-center">
                    <h2 class="text-sm text-fz-accent tracking-[0.3em] font-bold uppercase text-center">Training Result</h2>
                    <p class="text-5xl font-normal text-center">수고하셨습니다!</p>
                </div>
                <div class="bg-fz-card/75 backdrop-blur-md p-10 rounded-3xl border-2 border-fz-accent shadow-2xl space-y-6">
                    <p id="accuracy" class="text-9xl font-bold text-fz-accent eng-title text-center">0%</p>
                    <p class="text-3xl text-white font-medium text-center"><span id="correct-count">0</span> / <span id="total-quiz">0</span>개 정답</p>
                </div>
                <button onclick="location.reload()" class="w-full bg-gray-200 text-black py-5 rounded-2xl font-bold text-xl">다시 도전하기</button>
            </div>
        </div>
    </main>

    <footer class="w-full py-8 px-10 text-right fixed bottom-0 z-50 bg-black/60 backdrop-blur-md">
        <div class="flex flex-col items-end">
            <p class="text-[11px] font-normal italic tracking-wide text-gray-400">
                만든사람 : <span class="ml-1">정호준</span>
            </p>
        </div>
    </footer>

    <script>
        // 기존 스크립트 로직 동일 유지
        let photoFiles = []; let currentIdx = 0; let correctAnswers = 0; let shuffledPhotos = [];
        async function loadPhotos() {
            const repoOwner = "psychjun"; const repoName = "shilla-training";
            try {
                const response = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/`);
                const data = await response.json();
                photoFiles = data.filter(file => file.name.includes('_1.jpg') || (file.name.endsWith('.jpg') && !['shilla_center.jpg', 'freezone_logo.png', 'shilla_logo.png', 'logo_fz_Platinum.png'].includes(file.name))).map(file => file.name);
                document.getElementById('total-count').innerText = photoFiles.length;
                const startBtn = document.getElementById('start-btn');
                startBtn.disabled = false; startBtn.innerText = "교육 시작";
                startBtn.classList.remove('bg-gray-600', 'cursor-not-allowed', 'opacity-50'); startBtn.classList.add('bg-fz-accent', 'hover:bg-white');
            } catch (e) { document.getElementById('total-count').innerText = "0"; }
        }
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = SpeechRecognition ? new SpeechRecognition() : null;
        if (recognition) { recognition.lang = 'ko-KR'; recognition.interimResults = false; }
        const micBtn = document.getElementById('mic-btn'); const overlay = document.getElementById('feedback-overlay'); const feedbackText = document.getElementById('feedback-text');
        function startGame() { shuffledPhotos = [...photoFiles].sort(() => Math.random() - 0.5); document.getElementById('start-section').classList.add('hidden'); document.getElementById('quiz-section').classList.remove('hidden'); showNextQuestion(); }
        function showNextQuestion() { if (currentIdx >= shuffledPhotos.length) return showFinalResult(); overlay.classList.remove('opacity-100'); overlay.classList.add('opacity-0'); feedbackText.innerText = ""; document.getElementById('employee-img').src = shuffledPhotos[currentIdx]; document.getElementById('result-feedback').innerText = ""; document.getElementById('status-msg').innerText = "이름을 말씀하세요."; }
        micBtn.addEventListener('click', () => { if (!recognition) return alert("미지원 브라우저"); try { recognition.start(); } catch(e) {} });
        if (recognition) { recognition.onstart = () => { micBtn.classList.add('mic-active'); document.getElementById('status-msg').innerText = "듣고 있습니다..."; }; recognition.onend = () => micBtn.classList.remove('mic-active'); recognition.onresult = (event) => { const speechResult = event.results[0][0].transcript.replace(/\s/g, ""); const fileName = shuffledPhotos[currentIdx]; const correctAnswer = fileName.split('_')[0].split('.')[0]; showFeedback(speechResult.includes(correctAnswer), correctAnswer); }; }
        function showFeedback(isCorrect, name) { overlay.classList.remove('opacity-0'); overlay.classList.add('opacity-100'); if (isCorrect) { feedbackText.innerText = "✅"; feedbackText.className = "text-9xl text-green-500 card-fade-in feedback-text"; document.getElementById('result-feedback').innerText = "정답: " + name; document.getElementById('result-feedback').className = "text-2xl font-bold text-green-400 h-10 pt-2 text-center"; correctAnswers++; } else { feedbackText.innerText = "❌"; feedbackText.className = "text-9xl text-red-500 card-fade-in feedback-text"; document.getElementById('result-feedback').innerText = "정답: " + name; document.getElementById('result-feedback').className = "text-2xl font-bold text-green-400 h-10 pt-2 text-center"; } setTimeout(() => { currentIdx++; showNextQuestion(); }, 1800); }
        function showFinalResult() { document.getElementById('quiz-section').classList.add('hidden'); document.getElementById('result-section').classList.remove('hidden'); const acc = Math.round((correctAnswers / shuffledPhotos.length) * 100); document.getElementById('accuracy').innerText = acc + "%"; document.getElementById('correct-count').innerText = correctAnswers; document.getElementById('total-quiz').innerText = shuffledPhotos.length; }
        loadPhotos();
    </script>
</body>
</html>
