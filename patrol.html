<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Patrol Task Operation - Shilla Security</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #000; color: white; margin: 0; overflow: hidden; height: 100dvh; }
        .manual-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; }
        .fz-green { color: #10b981; }
        .scroll-box::-webkit-scrollbar { width: 4px; }
        .scroll-box::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col items-center">
    <header class="w-full p-3 flex justify-between items-center z-50 bg-white shadow-md h-14" onclick="location.href='index.html'">
        <img src="freezone_logo.png" alt="Freezone" class="h-6 w-auto">
        <img src="shilla_logo.png" alt="Shilla" class="h-7 w-auto"> 
    </header>

    <main class="w-full max-w-sm px-6 pt-10 flex flex-col h-[calc(100dvh-56px)]">
        <div class="mb-6">
            <h2 class="text-4xl font-black italic tracking-tighter uppercase"><span class="fz-green">P</span>atrol</h2>
            <p class="text-gray-500 font-bold text-xs uppercase tracking-widest leading-none">Task Operation Manual</p>
        </div>

        <div class="manual-card flex-grow mb-10 p-6 shadow-2xl flex flex-col overflow-hidden">
            <div class="flex justify-between items-center mb-4 border-b border-white/10 pb-2">
                <span class="text-[10px] font-bold text-[#10b981] uppercase">Instruction Guide</span>
                <span class="text-[9px] text-gray-500 italic">Updated Realtime</span>
            </div>
            
            <div id="manual-content" class="scroll-box flex-grow overflow-y-auto text-gray-200 text-sm leading-relaxed whitespace-pre-wrap">
                데이터를 불러오는 중...
            </div>
        </div>

        <button onclick="location.href='index.html'" class="w-full bg-[#10b981] text-black font-black py-5 rounded-2xl mb-8 shadow-lg active:scale-95 transition-all">메인화면으로</button>
    </main>

    <script>
        const REPO = "psychjun/shilla-training";
        
        async function loadManual() {
            const contentDiv = document.getElementById('manual-content');
            try {
                // 캐시 방지 타임스탬프(?t=...)를 사용하여 GitHub에서 항상 최신 매뉴얼을 읽어옴
                const res = await fetch(`https://raw.githubusercontent.com/${REPO}/main/patrol_manual.json?t=${Date.now()}`);
                const data = await res.json();
                contentDiv.innerText = data.content;
            } catch(e) {
                contentDiv.innerText = "매뉴얼을 불러오는 데 실패했습니다. 관리자 페이지에서 매뉴얼을 먼저 작성하고 저장해 주세요.";
            }
        }

        window.onload = loadManual;
    </script>
</body>
</html>
