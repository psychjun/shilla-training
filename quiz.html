<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Shilla Name Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #0b0b0b; color: white; margin: 0; overflow: hidden; height: 100dvh; }
        .quiz-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; }
        .timer-bar { transition: width 1s linear; background: #10b981; height: 4px; position: absolute; top: 0; left: 0; }
        .ans-btn { background: #1a1a1a; border: 1px solid #333; transition: 0.2s; }
        .ans-btn:active { transform: scale(0.95); background: #333; }
    </style>
</head>
<body class="flex flex-col items-center">
    <header class="w-full p-3 flex justify-between items-center z-50 bg-white shadow-md h-14">
        <div class="text-black font-black text-lg" onclick="location.href='index.html'"><span class="text-[#10b981]">Q</span>UIZ</div>
        <img src="shilla_logo.png" alt="Shilla" class="h-7 w-auto">
    </header>

    <main class="w-full max-w-sm px-6 pt-10 flex-grow flex flex-col items-center relative">
        <div class="w-full bg-gray-800 h-1 mt-4 relative overflow-hidden rounded-full">
            <div id="timer-progress" class="timer-bar w-full"></div>
        </div>
        
        <div class="flex justify-between w-full mt-2 px-1">
            <span id="score-display" class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Score: 0</span>
            <span id="timer-text" class="text-xl font-black text-[#10b981]">10</span>
        </div>

        <div class="quiz-card w-full aspect-square mt-6 relative overflow-hidden flex items-center justify-center">
            <img id="staff-img" src="" class="w-full h-full object-cover">
            <div id="feedback" class="absolute inset-0 flex items-center justify-center text-6xl hidden"></div>
        </div>

        <div id="choice-container" class="grid grid-cols-2 gap-3 w-full mt-8">
            </div>

        <button id="start-btn" onclick="startGame()" class="w-full bg-[#10b981] text-black font-black py-5 rounded-2xl mt-10 shadow-lg shadow-green-900/20 active:scale-95 transition-all">
            게임 시작
        </button>
    </main>

    <script>
        const REPO = "psychjun/shilla-training";
        let staffList = [];
        let currentQuestion = null;
        let score = 0;
        let timeLeft = 10;
        let timerInterval = null;

        // [핵심] 타이머 버저 소리 객체 (팀장님 요청사항)
        const buzzerSound = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');

        // 게임 시작 전 데이터 로드
        window.onload = async () => {
            try {
                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/`);
                const data = await res.json();
                // 로고 등 제외하고 직원 사진(.jpg)만 추출
                staffList = data.filter(f => f.name.endsWith('.jpg') && !f.name.includes('shilla_center'));
            } catch(e) {
                alert("데이터 로드 실패");
            }
        };

        function startGame() {
            score = 0;
            document.getElementById('score-display').innerText = `Score: ${score}`;
            document.getElementById('start-btn').classList.add('hidden');
            nextQuestion();
        }

        function nextQuestion() {
            if (staffList.length < 4) return alert("사진 데이터가 부족합니다.");
            
            // 랜덤 문제 선정
            const correctIdx = Math.floor(Math.random() * staffList.length);
            currentQuestion = staffList[correctIdx];
            const correctName = currentQuestion.name.split('_')[0]; // 홍길동_1.jpg -> 홍길동

            // 오답 섞기
            let choices = [correctName];
            while(choices.length < 4) {
                let randName = staffList[Math.floor(Math.random() * staffList.length)].name.split('_')[0];
                if(!choices.includes(randName)) choices.push(randName);
            }
            choices.sort(() => Math.random() - 0.5);

            // UI 업데이트
            document.getElementById('staff-img').src = currentQuestion.download_url;
            const btnBox = document.getElementById('choice-container');
            btnBox.innerHTML = choices.map(name => `
                <button onclick="checkAnswer('${name}', '${correctName}')" class="ans-btn py-4 rounded-xl font-bold text-sm">
                    ${name}
                </button>
            `).join('');

            startTimer();
        }

        function startTimer() {
            timeLeft = 10;
            updateTimerUI();
            if(timerInterval) clearInterval(timerInterval);

            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerUI();

                if(timeLeft <= 0) {
                    clearInterval(timerInterval);
                    playBuzzer(); // [원복 기능] 시간 초과 시 소리 재생
                    showFeedback(false);
                    setTimeout(nextQuestion, 1000);
                }
            }, 1000);
        }

        function updateTimerUI() {
            document.getElementById('timer-text').innerText = timeLeft;
            document.getElementById('timer-progress').style.width = (timeLeft * 10) + "%";
            // 3초 남았을 때 빨간색 강조
            document.getElementById('timer-text').style.color = timeLeft <= 3 ? "#ef4444" : "#10b981";
        }

        function playBuzzer() {
            buzzerSound.currentTime = 0;
            buzzerSound.play().catch(e => console.log("Audio Play Blocked"));
        }

        function checkAnswer(selected, correct) {
            clearInterval(timerInterval);
            if(selected === correct) {
                score += 10;
                document.getElementById('score-display').innerText = `Score: ${score}`;
                showFeedback(true);
            } else {
                playBuzzer(); // [원복 기능] 오답 시에도 소리 재생
                showFeedback(false);
            }
            setTimeout(nextQuestion, 1000);
        }

        function showFeedback(isCorrect) {
            const fb = document.getElementById('feedback');
            fb.innerText = isCorrect ? "O" : "X";
            fb.style.color = isCorrect ? "#10b981" : "#ef4444";
            fb.classList.remove('hidden');
            setTimeout(() => fb.classList.add('hidden'), 800);
        }
    </script>
</body>
</html>
