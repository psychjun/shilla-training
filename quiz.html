<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Shilla Voice Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #0b0b0b; color: white; margin: 0; overflow: hidden; height: 100dvh; }
        .quiz-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; }
        .timer-bar { transition: width 1s linear; background: #10b981; height: 4px; position: absolute; top: 0; left: 0; }
        .mic-active { animation: pulse 1.5s infinite; color: #10b981; opacity: 1 !important; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="flex flex-col items-center">
    <header class="w-full p-3 flex justify-between items-center z-50 bg-white shadow-md h-14">
        <div class="text-black font-black text-lg" onclick="location.href='index.html'"><span class="text-[#10b981]">V</span>OICE QUIZ</div>
        <img src="shilla_logo.png" alt="Shilla" class="h-7 w-auto">
    </header>

    <main class="w-full max-w-sm px-6 pt-10 flex-grow flex flex-col items-center relative">
        <div class="w-full bg-gray-800 h-1 mt-4 relative overflow-hidden rounded-full">
            <div id="timer-progress" class="timer-bar w-full"></div>
        </div>
        
        <div class="flex justify-between w-full mt-2 px-1">
            <span id="score-display" class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Score: 0</span>
            <span id="timer-text" class="text-xl font-black text-[#10b981]">10</span>
        </div>

        <div class="quiz-card w-full aspect-square mt-6 relative overflow-hidden flex items-center justify-center">
            <img id="staff-img" src="" class="w-full h-full object-cover">
            <div id="feedback" class="absolute inset-0 flex items-center justify-center text-9xl font-black hidden"></div>
        </div>

        <div class="mt-12 flex flex-col items-center">
            <div id="mic-icon" class="text-6xl opacity-20 mb-4 transition-all">🎤</div>
            <p id="status-msg" class="text-gray-500 font-bold text-sm">대기 중...</p>
            <p id="transcript" class="text-[#10b981] font-black text-2xl mt-2 h-10"></p>
        </div>

        <button id="start-btn" onclick="startGame()" class="w-full bg-[#10b981] text-black font-black py-5 rounded-2xl mt-10 shadow-lg active:scale-95 transition-all">
            퀴즈 시작 (음성인식)
        </button>
    </main>

    <script>
        const REPO = "psychjun/shilla-training";
        let staffList = [];
        let currentQuestion = null;
        let score = 0;
        let timeLeft = 10;
        let timerInterval = null;
        let recognition = null;
        let audioCtx = null;

        // [소리 기능] 삑! 소리 재생 (Web Audio API)
        function playBuzzer() {
            if (!audioCtx) return;
            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'sine'; osc.frequency.value = 800; gain.gain.value = 0.1;
                osc.start(); setTimeout(() => osc.stop(), 200);
            } catch(e) { console.log(e); }
        }

        // [오리지널] 음성 인식 설정
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = true;
            recognition.lang = 'ko-KR';

            recognition.onstart = () => {
                document.getElementById('mic-icon').classList.add('mic-active');
                document.getElementById('status-msg').innerText = "이름을 말씀하세요";
            };

            recognition.onresult = (event) => {
                let interim = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    let text = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        checkAnswer(text.replace(/\s/g, ""));
                    } else {
                        interim += text;
                        document.getElementById('transcript').innerText = interim;
                    }
                }
            };

            recognition.onend = () => {
                document.getElementById('mic-icon').classList.remove('mic-active');
            };
        }

        window.onload = async () => {
            const res = await fetch(`https://api.github.com/repos/${REPO}/contents/`);
            const data = await res.json();
            staffList = data.filter(f => f.name.endsWith('.jpg') && !f.name.includes('shilla_center'));
        };

        function startGame() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            score = 0;
            document.getElementById('score-display').innerText = `Score: ${score}`;
            document.getElementById('start-btn').classList.add('hidden');
            nextQuestion();
        }

        function nextQuestion() {
            if (staffList.length === 0) return;
            const rand = Math.floor(Math.random() * staffList.length);
            currentQuestion = staffList[rand];
            document.getElementById('staff-img').src = currentQuestion.download_url;
            document.getElementById('transcript').innerText = "";
            
            startTimer();
            if(recognition) recognition.start();
        }

        function startTimer() {
            timeLeft = 10;
            updateTimerUI();
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerUI();
                if(timeLeft <= 0) {
                    clearInterval(timerInterval);
                    if(recognition) recognition.stop();
                    playBuzzer(); // 시간초과 소리
                    showFeedback(false);
                    setTimeout(nextQuestion, 1500);
                }
            }, 1000);
        }

        function updateTimerUI() {
            document.getElementById('timer-text').innerText = timeLeft;
            document.getElementById('timer-progress').style.width = (timeLeft * 10) + "%";
        }

        function checkAnswer(said) {
            clearInterval(timerInterval);
            if(recognition) recognition.stop();
            
            const correct = currentQuestion.name.split('_')[0];
            document.getElementById('transcript').innerText = said;

            if(said.includes(correct)) {
                score += 10;
                document.getElementById('score-display').innerText = `Score: ${score}`;
                showFeedback(true);
            } else {
                playBuzzer(); // 오답 소리
                showFeedback(false);
            }
            setTimeout(nextQuestion, 1500);
        }

        function showFeedback(isCorrect) {
            const fb = document.getElementById('feedback');
            fb.innerText = isCorrect ? "O" : "X";
            fb.style.color = isCorrect ? "#10b981" : "#ef4444";
            fb.classList.remove('hidden');
            setTimeout(() => fb.classList.add('hidden'), 1000);
        }
    </script>
</body>
</html>
