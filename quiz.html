<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Shilla Names - Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&family=Playfair+Display:wght@600&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #000; color: white; margin: 0; overflow: hidden; height: 100dvh; }
        .eng-title { font-family: 'Playfair Display', serif; }
        .timer-danger { color: #ef4444 !important; animation: shake 0.2s infinite; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-2px); } 75% { transform: translateX(2px); } }
        .mic-active { box-shadow: 0 0 20px #10b981; background-color: #064e3b !important; }
    </style>
</head>
<body class="flex flex-col">
    <header onclick="location.href='index.html'" class="w-full p-3 flex justify-between items-center z-50 bg-white shadow-md h-12 cursor-pointer">
        <img src="freezone_logo.png" alt="Freezone" class="h-6 w-auto">
        <div class="text-black text-xs font-bold">뒤로가기</div>
    </header>

    <main class="flex-grow flex flex-col items-center px-6 pt-4">
        <div id="quiz-container" class="w-full max-w-sm flex flex-col h-full space-y-4">
            <div class="relative w-full aspect-[3/4] bg-[#161616] rounded-2xl border-2 border-[#d4af37] overflow-hidden shadow-2xl">
                <img id="employee-img" src="" class="w-full h-full object-contain">
                <div id="feedback-overlay" class="absolute inset-0 flex items-center justify-center opacity-0 bg-black/70 transition-opacity">
                    <div id="feedback-text" class="text-8xl font-bold"></div>
                </div>
            </div>

            <div class="flex flex-col items-center space-y-3">
                <div id="result-feedback" class="text-xl font-bold h-7 text-[#d4af37]"></div>
                <div id="timer-display" class="text-5xl font-black eng-title">10.0</div>
                
                <div class="flex flex-col items-center w-full">
                    <button id="mic-btn" class="w-16 h-16 rounded-full bg-red-600 flex items-center justify-center shadow-lg transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="w-8 h-8 text-white"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18.75a6 6 0 0 0 6-6v-1.5m-6 7.5a6 6 0 0 1-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 0 1-3-3V4.5a3 3 0 1 1 6 0v8.25a3 3 0 0 1-3 3Z" /></svg>
                    </button>
                    <p id="mic-status" class="text-[10px] text-emerald-400 mt-2 opacity-0">말씀하세요!</p>
                </div>
            </div>
        </div>

        <div id="result-section" class="hidden w-full max-w-sm flex flex-col items-center justify-center space-y-10 py-20">
            <div class="bg-[#161616] p-10 rounded-3xl border-2 border-[#d4af37] text-center w-full">
                <p id="accuracy" class="text-7xl font-bold text-[#d4af37]">0%</p>
                <p class="text-xl mt-4"><span id="correct-count">0</span> / <span id="total-quiz">0</span> 정답</p>
            </div>
            <button onclick="location.reload()" class="w-full bg-white text-black py-4 rounded-xl font-bold">다시 도전</button>
        </div>
    </main>

    <script>
        const REPO = "psychjun/shilla-training";
        let photos = []; let currentIdx = 0; let corrects = 0; let timer; let aCtx;

        async function init() {
            if(!sessionStorage.getItem('isLoggedIn')) { location.href='index.html'; return; }
            const res = await fetch(`https://api.github.com/repos/${REPO}/contents/`);
            const data = await res.json();
            photos = data.filter(f => f.name.endsWith('.jpg') && !f.name.includes('_logo') && f.name !== 'shilla_center.jpg').map(f => f.name).sort(() => Math.random() - 0.5);
            startQuiz();
        }

        function startQuiz() {
            aCtx = new (window.AudioContext || window.webkitAudioContext)();
            showQuestion();
        }

        function showQuestion() {
            if(currentIdx >= photos.length) { showResult(); return; }
            document.getElementById('feedback-overlay').style.opacity = "0";
            document.getElementById('employee-img').src = photos[currentIdx];
            document.getElementById('result-feedback').innerText = "";
            runTimer();
        }

        function runTimer() {
            let left = 10.0;
            const disp = document.getElementById('timer-display');
            clearInterval(timer);
            timer = setInterval(() => {
                left -= 0.1;
                disp.innerText = left.toFixed(1);
                if(left <= 0) { clearInterval(timer); handleAnswer(false); }
                if(left <= 3) disp.classList.add('timer-danger');
            }, 100);
        }

        function handleAnswer(isCorrect) {
            clearInterval(timer);
            const name = photos[currentIdx].split('_')[0].split('.')[0];
            const ov = document.getElementById('feedback-overlay');
            const txt = document.getElementById('feedback-text');
            ov.style.opacity = "1";
            if(isCorrect) { txt.innerText = "✅"; txt.style.color = "#22c55e"; corrects++; }
            else { txt.innerText = "❌"; txt.style.color = "#ef4444"; }
            document.getElementById('result-feedback').innerText = "정답: " + name;
            setTimeout(() => { currentIdx++; showQuestion(); }, 1500);
        }

        function showResult() {
            document.getElementById('quiz-container').classList.add('hidden');
            document.getElementById('result-section').classList.remove('hidden');
            document.getElementById('accuracy').innerText = Math.round((corrects/photos.length)*100) + "%";
            document.getElementById('correct-count').innerText = corrects;
            document.getElementById('total-quiz').innerText = photos.length;
        }

        // 음성 인식 설정
        const SRecog = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(SRecog) {
            const r = new SRecog(); r.lang = 'ko-KR';
            document.getElementById('mic-btn').onclick = () => r.start();
            r.onstart = () => { document.getElementById('mic-btn').classList.add('mic-active'); document.getElementById('mic-status').style.opacity = "1"; };
            r.onend = () => { document.getElementById('mic-btn').classList.remove('mic-active'); document.getElementById('mic-status').style.opacity = "0"; };
            r.onresult = (e) => {
                const name = photos[currentIdx].split('_')[0].split('.')[0];
                const input = e.results[0][0].transcript.replace(/\s/g, "");
                handleAnswer(input.includes(name));
            };
        }
        init();
    </script>
</body>
</html>
